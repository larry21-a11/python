<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Aplicacion</title>
</head>
<body>
    <!-- CONTENEDOR -->
    <div class="container">

        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <!-- URL DE home -->
                <a class="navbar-brand" href={% url 'home' %}>Mi Aplicacion DJANGO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <!-- URL DE Inicio-->
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href={% url 'home' %}>Inicio</a>
                        </li>
                        <!-- URL DE Nosotros-->
                        <li class="nav-item">
                            <a class="nav-link" href="#">Nosotros</a>
                        </li>
                        <!-- URL DE Productos-->
                        <li class="nav-item">
                            <a class="nav-link" href={% url 'products' %}>Productos</a>
                        </li>
                        {% if request.user.is_authenticated %}
                            <!-- URL DE Salir-->
                            <li class="nav-item">
                                <a class="nav-link" href={% url 'exit' %}>Salir</a>
                            </li> 
                        {% else %}
                            <!-- URL DE Inicio-->
                            <li class="nav-item">
                                <a class="nav-link" href={% url 'login' %}>Ingresar</a>
                            </li> 

                            
                            <li class="nav-item">
                                <!-- URL DE Registrarse-->
                                <a class="nav-link" href={% url 'register' %}>Registrarse</a>
                            </li> 

                        {% endif %}

                    </ul>
                </div>
            </div>
        </nav>        

        <h2>Inicio</h2>


    {% block content %}{% endblock %}

    </div>
    
    

</body>
</html>
